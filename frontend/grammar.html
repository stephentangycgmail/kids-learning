<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Grammar - Tenses Practice</title>
    <!-- PWA 與手機適配設定 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a"> <!-- 讓瀏覽器網址列也變深色 -->

    <style>
        /* ====== 全域設定 (深色模式) ====== */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; /* PWA 禁止整頁捲動 */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a; /* 深藍底色 (對應圖片) */
            color: #e2e8f0; /* 淺灰白文字 */
            display: flex;
            flex-direction: column;
        }

        .page-container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
            background-color: #0f172a;
        }

        /* ====== 上方固定區塊 (Header + Tabs) ====== */
        
        .fixed-top-area {
            flex: 0 0 auto;
            background-color: #0f172a; /* 與背景同色 */
            padding: 16px 16px 0 16px;
            padding-top: max(16px, env(safe-area-inset-top));
            z-index: 10;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4); /* 深色陰影 */
        }

        header {
            margin-bottom: 12px;
        }

        header h1 {
            font-size: 1.5rem;
            margin: 0 0 6px 0;
            color: #f8fafc; /* 亮白標題 */
            font-weight: 700;
        }

        header p {
            margin: 0;
            font-size: 0.9rem;
            color: #94a3b8; /* 次要文字顏色 */
        }

        /* 返回按鈕 (深色版) */
        .back-link {
            display: inline-flex;
            align-items: center;
            margin-bottom: 12px;
            font-size: 0.85rem;
            text-decoration: none;
            color: #60a5fa; /* 亮藍色連結 */
            background: rgba(30, 41, 59, 0.8);
            padding: 6px 12px;
            border-radius: 99px;
            border: 1px solid #334155;
        }
        .back-link:active { opacity: 0.7; }

        /* ====== Tabs (橫向滑動 - 深色版) ====== */

        .grammar-main-tabs, .tense-tabs {
            display: flex;
            flex-wrap: nowrap;
            overflow-x: auto;
            gap: 10px;
            padding-bottom: 10px;
            margin: 0 -16px 4px -16px;
            padding-left: 16px;
            padding-right: 16px;
            scrollbar-width: none;
        }
        .grammar-main-tabs::-webkit-scrollbar, .tense-tabs::-webkit-scrollbar { display: none; }

        .grammar-main-tab, .tense-tab {
            flex: 0 0 auto;
            background: #1e293b; /* 深灰藍按鈕底色 */
            border: 1px solid #334155;
            color: #cbd5e1;
            padding: 8px 16px;
            border-radius: 99px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .grammar-main-tab.active, .tense-tab.active {
            background: #3b82f6; /* 亮藍色選中狀態 */
            color: #ffffff;
            border-color: #3b82f6;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.4);
        }

        /* ====== 內容區塊結構 ====== */
        
        .grammar-section, .tense-panel {
            display: none;
            flex-direction: column;
            flex: 1;
            overflow: hidden;
        }
        .grammar-section.active, .tense-panel.active { display: flex; }

        /* 固定資訊區 (標題 + Tip) */
        .panel-fixed-header {
            flex: 0 0 auto;
            padding: 10px 16px 16px 16px;
            background-color: #0f172a;
            border-bottom: 1px solid #1e293b;
        }

        .tense-title {
            font-size: 1.25rem;
            margin: 0 0 8px 0;
            color: #f1f5f9;
        }

        .tense-tip {
            background: rgba(59, 130, 246, 0.1); /* 半透明藍底 */
            border-left: 4px solid #3b82f6;
            border-radius: 8px;
            padding: 12px;
            font-size: 0.9rem;
            line-height: 1.5;
            color: #bfdbfe; /* 淺藍色文字 */
        }
        .tense-tip strong { color: #60a5fa; }

        /* ====== 捲動列表區 ====== */
        
        .scroll-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            padding-bottom: 80px;
            -webkit-overflow-scrolling: touch;
        }

        /* ====== 卡片樣式 (深色版) ====== */

        .sentence-block {
            background: #1e293b; /* 卡片深色背景 */
            margin-bottom: 16px;
            padding: 16px;
            border-radius: 12px;
            border: 1px solid #334155; /* 微邊框 */
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .sentence-header {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 8px;
        }

        .play-sentence {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: #3b82f6;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(59, 130, 246, 0.4);
        }
        .play-sentence:active { transform: scale(0.95); background: #2563eb; }

        .sentence-text {
            font-size: 1.1rem;
            line-height: 1.6;
            padding-top: 4px;
            color: #f1f5f9; /* 句子文字顏色 */
        }

        /* 互動單字 */
        .sentence-text .word {
            cursor: pointer;
            padding: 2px 2px;
            border-radius: 4px;
            transition: background 0.1s;
        }
        .sentence-text .word:active { background: rgba(255,255,255,0.1); }

        /* 關鍵字與高亮 (深色模式下的黃色) */
        .sentence-text .keyword {
            font-weight: 700;
            color: #000000; /* 強制黑色文字 */
            background: #fde047; /* 亮黃色背景 */
            padding: 2px 4px;
            border-radius: 4px;
            box-shadow: 0 0 5px rgba(253, 224, 71, 0.3);
        }
        
        /* 當前朗讀高亮 */
        .sentence-text .current-reading {
            background: #facc15; /* 更深的黃色 */
            color: #000000;      /* 強制黑色文字 */
            box-shadow: 0 0 0 2px #facc15, 0 0 10px rgba(250, 204, 21, 0.5);
            border-radius: 4px;
            z-index: 1;
            position: relative;
        }

        .sentence-explanation {
            margin: 8px 0 0 0;
            font-size: 0.9rem;
            color: #94a3b8; /* 解釋文字顏色 */
            padding-left: 52px;
        }
        .sentence-explanation span.label {
            color: #cbd5e1;
            font-weight: 600;
        }

        .no-data, .coming-soon-box {
            text-align: center;
            padding: 30px;
            background: #1e293b;
            border-radius: 12px;
            color: #64748b;
            border: 1px solid #334155;
        }
    </style>
</head>
<body>

<div class="page-container">
    
    <!-- 固定上方區 (Header) -->
    <div class="fixed-top-area">
        <a href="eng.html" class="back-link">&larr; Back</a>
        
        <header>
            <h1>Kids English – Grammar</h1>
            <p>Look at keywords to choose the tense.</p>
        </header>

        <!-- Main Tabs -->
        <div class="grammar-main-tabs">
            <button class="grammar-main-tab active" data-section="tenses">Tenses (時態)</button>
            <button class="grammar-main-tab" data-section="parts-of-speech">Parts of Speech (詞性)</button>
            <button class="grammar-main-tab" data-section="sentence-patterns">Sentence Patterns (句型)</button>
        </div>
    </div>

    <!-- Tenses Section -->
    <div class="grammar-section active" data-section-panel="tenses">

        <!-- Grammar lesson tabs are generated from grammar_catalog.json. -->
        <div style="background: #0f172a; padding: 0 16px; flex: 0 0 auto;">
            <div id="grammarLessonTabs" class="tense-tabs"></div>
        </div>
        <div id="grammarLessonStatus" class="panel-fixed-header">
            <p class="no-data">Loading grammar lessons...</p>
        </div>
    </div>

    <!-- Parts of Speech Placeholder -->
    <div class="grammar-section" data-section-panel="parts-of-speech">
        <div class="scroll-content">
            <div class="coming-soon-box">
                <h2>Parts of Speech（詞性）</h2>
                <p>Nouns, verbs, adjectives, adverbs...</p>
            </div>
        </div>
    </div>

    <!-- Sentence Patterns Placeholder -->
    <div class="grammar-section" data-section-panel="sentence-patterns">
        <div class="scroll-content">
            <div class="coming-soon-box">
                <h2>Sentence Patterns（句型）</h2>
                <p>S + V + O, There is / There are...</p>
            </div>
        </div>
    </div>
</div>

<script>
    const GRAMMAR_CATALOG_PATH = "data/grammar_catalog.json";
    let grammarLessons = [];
    const tenseDataCache = {};

    /* ========= SIMPLE SLOW TTS (NO HIGHLIGHT) ========= */

    function getDefaultSpeechRate() {
        const ua = navigator.userAgent || "";
        if (/iPhone|iPad|iPod|Android/i.test(ua)) {
            return 0.60;   
        }
        return 0.70;       
    }

    let speechRate = getDefaultSpeechRate();

    function getWordSpeechRate(word) {
        if (!word) return speechRate;
        if (word.length <= 3) return 0.45;
        if (word.length <= 6) return 0.55;
        return speechRate;
    }

    function stopReading() {
        if ("speechSynthesis" in window) {
            window.speechSynthesis.cancel();
        }
    }

    function speakSentence(text) {
        if (!("speechSynthesis" in window)) {
            alert("Speech is not supported on this browser.");
            return;
        }
        if (!text || !text.trim()) return;

        window.speechSynthesis.cancel();

        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = "en-US";
        utter.rate = speechRate;

        window.speechSynthesis.speak(utter);
    }

    function speakWord(word) {
        if (!("speechSynthesis" in window)) {
            alert("Speech is not supported on this browser.");
            return;
        }
        if (!word || !word.trim()) return;

        window.speechSynthesis.cancel();

        const utter = new SpeechSynthesisUtterance(word);
        utter.lang = "en-US";
        utter.rate = getWordSpeechRate(word);

        window.speechSynthesis.speak(utter);
    }

    /* ========= build sentence HTML (with keyword highlight) ========= */

    function buildEnglishHtmlWithWords(item) {
        const english = item.english || "";
        const highlightWords = new Set();

        (item.time_keywords || []).forEach(k => {
            if (!k) return;
            const lower = k.toLowerCase();
            highlightWords.add(lower);
            if (lower.includes(" ")) {
                lower.split(/\s+/).forEach(part => {
                    if (part) highlightWords.add(part);
                });
            }
        });

        ["always", "usually", "often", "sometimes", "never", "seldom"].forEach(w => {
            highlightWords.add(w);
        });

        const tokens = english.split(/(\s+)/);

        return tokens
            .map(token => {
                if (/^\s+$/.test(token)) return token;

                const clean = token.replace(/[.,!?;:"]/g, "");
                if (!clean) return token;

                const lowerClean = clean.toLowerCase();
                const isKeyword = highlightWords.has(lowerClean);

                const escapedToken = token.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
                const escapedClean = clean.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

                const classes = ["word"];
                if (isKeyword) {
                    classes.push("keyword");
                }

                return `<span class="${classes.join(" ")}" data-word="${escapedClean}">${escapedToken}</span>`;
            })
            .join("");
    }

    /* ========= Render sentences ========= */

    function normalizeLessonData(data) {
        if (Array.isArray(data)) {
            return { examples: data, explanation_en: "", explanation_zh: "", keywords: [] };
        }
        return {
            examples: Array.isArray(data && data.examples) ? data.examples : [],
            explanation_en: data && data.explanation_en ? data.explanation_en : "",
            explanation_zh: data && data.explanation_zh ? data.explanation_zh : "",
            keywords: Array.isArray(data && data.keywords) ? data.keywords : []
        };
    }

    function renderLessonSummary(lessonId, lessonData) {
        const panel = document.querySelector(`[data-tense-panel="${lessonId}"]`);
        const tip = panel && panel.querySelector(".tense-tip");
        if (!tip) return;

        const keywordSet = new Set(lessonData.keywords);
        lessonData.examples.forEach(item => {
            (item.time_keywords || []).forEach(keyword => keywordSet.add(keyword));
        });

        tip.innerHTML = "";
        const keywords = document.createElement("p");
        const keywordsLabel = document.createElement("strong");
        keywordsLabel.textContent = "Keywords: ";
        keywords.append(keywordsLabel, document.createTextNode([...keywordSet].slice(0, 10).join(", ") || "See highlighted words below."));
        tip.appendChild(keywords);

        if (lessonData.explanation_en) {
            const english = document.createElement("p");
            english.textContent = lessonData.explanation_en;
            tip.appendChild(english);
        }
        if (lessonData.explanation_zh) {
            const chinese = document.createElement("p");
            chinese.textContent = lessonData.explanation_zh;
            tip.appendChild(chinese);
        }
    }

    function renderTenseSentences(tenseKey, data) {
        const containerId = "sentences-" + tenseKey;
        const container = document.getElementById(containerId);
        if (!container) return;

        container.innerHTML = "";
        const lessonData = normalizeLessonData(data);
        renderLessonSummary(tenseKey, lessonData);

        if (lessonData.examples.length === 0) {
            container.innerHTML = '<p class="no-data">No sentences in JSON yet.</p>';
            return;
        }

        lessonData.examples.forEach(item => {
            const block = document.createElement("div");
            block.className = "sentence-block";

            const englishHtml = buildEnglishHtmlWithWords(item);

            block.innerHTML = `
                <div class="sentence-header">
                    <button class="play-sentence" type="button" aria-label="Play sentence">&#9658;</button>
                    <div class="sentence-text">${englishHtml}</div>
                </div>
                <p class="sentence-explanation">
                    <span class="label">中文解釋：</span>${item.chinese || ""}
                </p>
                <p class="sentence-explanation">
                    <span class="label">時態提示：</span>${item.reason_cn || ""}
                </p>
            `;

            const playBtn = block.querySelector(".play-sentence");
            if (playBtn) {
                playBtn.addEventListener("click", () => {
                    speakSentence(item.english || "");
                });
            }

            const wordSpans = block.querySelectorAll(".sentence-text .word");
            wordSpans.forEach(span => {
                span.addEventListener("click", () => {
                    const word = span.getAttribute("data-word");
                    if (word) speakWord(word);
                });
            });

            container.appendChild(block);
        });
    }

    /* ========= Load JSON ========= */

    function loadTenseData(lesson) {
        if (tenseDataCache[lesson.id]) {
            renderTenseSentences(lesson.id, tenseDataCache[lesson.id]);
            return;
        }

        const filePath = "data/" + lesson.file;
        const containerId = "sentences-" + lesson.id;
        const container = document.getElementById(containerId);

        if (container) {
            container.innerHTML = '<p class="no-data">Loading sentences...</p>';
        }

        fetch(filePath)
            .then(res => {
                if (!res.ok) throw new Error("HTTP " + res.status);
                return res.json();
            })
            .then(json => {
                tenseDataCache[lesson.id] = json;
                renderTenseSentences(lesson.id, json);
            })
            .catch(err => {
                console.error("Failed to load grammar JSON for", lesson.id, err);
                if (container) {
                    container.innerHTML =
                        '<p class="no-data">Cannot load JSON file. Please check the path.</p>';
                }
            });
    }

    function activateGrammarLesson(lesson) {
        document.querySelectorAll(".tense-tab").forEach(tab => {
            tab.classList.toggle("active", tab.dataset.tense === lesson.id);
        });
        document.querySelectorAll(".tense-panel").forEach(panel => {
            panel.classList.toggle("active", panel.dataset.tensePanel === lesson.id);
        });
        stopReading();
        loadTenseData(lesson);
    }

    function createGrammarLessonControls(lessons) {
        const tabs = document.getElementById("grammarLessonTabs");
        const section = document.querySelector('[data-section-panel="tenses"]');
        const status = document.getElementById("grammarLessonStatus");
        tabs.innerHTML = "";
        status.remove();

        lessons.forEach((lesson, index) => {
            const tab = document.createElement("button");
            tab.className = "tense-tab" + (index === 0 ? " active" : "");
            tab.dataset.tense = lesson.id;
            tab.textContent = lesson.title;
            tab.addEventListener("click", () => activateGrammarLesson(lesson));
            tabs.appendChild(tab);

            const panel = document.createElement("section");
            panel.className = "tense-panel" + (index === 0 ? " active" : "");
            panel.dataset.tensePanel = lesson.id;
            panel.innerHTML = `
                <div class="panel-fixed-header">
                    <h2 class="tense-title"></h2>
                    <div class="tense-tip"></div>
                </div>
                <div class="scroll-content">
                    <div id="sentences-${lesson.id}" class="sentence-list"></div>
                </div>
            `;
            panel.querySelector(".tense-title").textContent = lesson.title;
            section.appendChild(panel);
        });
    }

    function loadGrammarCatalog() {
        return fetch(GRAMMAR_CATALOG_PATH)
            .then(res => {
                if (!res.ok) throw new Error("HTTP " + res.status);
                return res.json();
            })
            .then(catalog => {
                grammarLessons = Array.isArray(catalog.lessons)
                    ? catalog.lessons.filter(lesson => lesson.category === "tenses" && lesson.id && lesson.title && lesson.file)
                    : [];
                if (!grammarLessons.length) throw new Error("No grammar lessons configured");
                createGrammarLessonControls(grammarLessons);
                activateGrammarLesson(grammarLessons[0]);
            })
            .catch(err => {
                console.error("Failed to load grammar catalog", err);
                const status = document.getElementById("grammarLessonStatus");
                if (status) status.innerHTML = '<p class="no-data">Cannot load grammar catalog.</p>';
            });
    }

    /* ========= Init ========= */

    document.addEventListener("DOMContentLoaded", function () {
        const mainTabs = document.querySelectorAll(".grammar-main-tab");
        const sections = document.querySelectorAll(".grammar-section");

        mainTabs.forEach(tab => {
            tab.addEventListener("click", () => {
                const sectionKey = tab.dataset.section;

                mainTabs.forEach(t => t.classList.remove("active"));
                tab.classList.add("active");

                sections.forEach(sec => {
                    if (sec.dataset.sectionPanel === sectionKey) {
                        sec.classList.add("active");
                    } else {
                        sec.classList.remove("active");
                    }
                });

                if (sectionKey !== "tenses") {
                    stopReading();
                }
            });
        });

        loadGrammarCatalog();
    });
</script>
</body>
</html>
