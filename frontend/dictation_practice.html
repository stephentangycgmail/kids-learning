<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dictation Practice</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    html,body{height:100%;margin:0;background-color:#0f172a;color:#f1f5f9;overflow:hidden}.main-wrapper{height:100vh;display:flex;flex-direction:column;padding:0 16px}.page-header{flex:0 0 auto;margin-top:20px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}.back-btn{border-radius:6px;font-weight:500;padding-left:16px;padding-right:16px;border-color:#38bdf8;color:#38bdf8}.back-btn:hover{background-color:#38bdf8;color:#000}.tts-controls{flex:0 0 auto;background-color:#1e293b;border-radius:8px;padding:20px;margin-bottom:12px;border:1px solid #334155;box-shadow:0 2px 4px rgba(0,0,0,.2);z-index:10}.sentence-list-wrapper{flex:1 1 auto;overflow-y:auto;padding-bottom:60px}.sentence-card{background-color:#1e293b;border-radius:16px;padding:16px 18px;margin-bottom:12px;border:1px solid #334155}.sentence-title{font-weight:600;margin-bottom:6px;color:#94a3b8;font-size:.9rem}.sentence-body{font-size:1.35rem;line-height:1.8;color:#f8fafc}.sentence-body.sentence-hidden{filter:blur(8px);user-select:none}.sentence-cn{font-size:1rem;color:#cbd5e1;background-color:#334155;padding:8px 12px;margin-top:5px;border-radius:8px}.word-token{display:inline-block;padding:0 2px;margin:0 1px;border-radius:4px;cursor:pointer;transition:background-color .15s ease}.word-token:hover{background-color:#38bdf8;color:#0f172a}.word-token.active{background-color:#facc15;box-shadow:0 0 0 2px #ca8a04 inset;color:#000}.mode-btn{color:#fff!important;border:1px solid #94a3b8!important;background-color:rgba(255,255,255,.05)}.mode-btn:hover{background-color:rgba(255,255,255,.18)!important;color:#fff!important}.mode-btn.active{background-color:#3b82f6!important;border-color:#3b82f6!important;color:#fff!important}#vocab-popup{position:fixed;max-width:260px;background-color:#020617;border-radius:12px;border:1px solid #facc15;padding:10px 12px;box-shadow:0 4px 12px rgba(0,0,0,.7);z-index:9999;font-size:.9rem;display:none}#vocab-popup .vocab-title{color:#facc15;font-weight:600;margin-bottom:4px}#vocab-popup .vocab-label{color:#e5e7eb;font-size:.8rem;margin-top:2px}#vocab-popup .vocab-usage{color:#e5e7eb;margin-top:2px}#vocab-popup .vocab-tenses{color:#cbd5e1;margin-top:4px;white-space:pre-line;font-size:.8rem}
  </style>
</head>
<body>
<div class="main-wrapper">
  <header class="page-header">
    <a href="eng.html" class="btn btn-outline-primary btn-sm back-btn">← Menu</a>
    <h1 class="h4 mb-0 text-light">Dictation Practice</h1>
    <div class="d-flex align-items-center gap-2">
      <label class="text-light mb-0" style="font-size:.9rem">Dictation:</label>
      <select id="dictationSelect" class="form-select form-select-sm" style="width:auto"><option value="">Loading...</option></select>
    </div>
  </header>
  <section class="tts-controls"><div class="d-flex flex-column gap-3">
    <div class="d-flex flex-wrap gap-2"><button class="btn btn-primary btn-sm" onclick="showAllSentences()">👀 Show All</button><button class="btn btn-secondary btn-sm" onclick="hideAllSentences()">🙈 Hide All</button></div>
    <div id="speechUnsupportedMessage" class="alert alert-warning py-2 px-3 mb-0 d-none" role="alert">Audio playback is not supported in this browser. Sentence text, translations, show/hide controls, and vocabulary help are still available.</div>
    <div class="d-flex flex-wrap align-items-center gap-3 mt-1"><span class="text-light">Reading Mode:</span><div class="btn-group btn-group-sm"><button id="mode-natural" class="btn mode-btn" onclick="setReadMode('natural')">Natural</button><button id="mode-fast" class="btn mode-btn" onclick="setReadMode('fast')">Fast</button><button id="mode-learning" class="btn mode-btn" onclick="setReadMode('learning')">Learning</button></div></div>
    <div class="row mt-2"><div class="col-6"><span class="text-light">Speed: <span id="speedValue">1.0x</span></span><input type="range" id="speedSlider" class="form-range" min="0.4" max="2.0" value="1.0" step="0.1"></div><div class="col-6"><span class="text-light">Pause between tokens: <span id="pauseValue">0 ms</span></span><input type="range" id="pauseSlider" class="form-range" min="0" max="800" value="0"></div></div>
  </div></section>
  <section class="sentence-list-wrapper"><div id="sentencesContainer"><div class="text-center text-muted mt-5"><div class="spinner-border text-primary"></div><div class="mt-2">Loading...</div></div></div></section>
</div>
<div id="vocab-popup"><div class="vocab-title"></div><div class="vocab-label"></div><div class="vocab-usage"></div><div class="vocab-tenses"></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
let dictationCatalog=[],sentences=[],vocabAI={},availableVoices=[],currentMode="natural",speechRate=1,wordPauseMs=0,isPlaying=false,currentUtterance=null,ttsTimer=null,playButtons=[],playbackPositions=[],currentSentenceIndex=null,currentTokenIndex=0,playbackGeneration=0;
const speechSupported=("speechSynthesis" in window)&&("SpeechSynthesisUtterance" in window)&&!!window.speechSynthesis&&!!window.SpeechSynthesisUtterance;
const punctuationMap={"!":"exclamation mark","?":"question mark",".":"full stop",",":"comma",":":"colon",";":"semicolon","'":"apostrophe",'"':"quote"};
const SETTINGS_KEYS={readMode:"kidsLearning.dictation.readMode",speechRate:"kidsLearning.dictation.speechRate",wordPauseMs:"kidsLearning.dictation.wordPauseMs"};
function splitIntoTokens(s){return s?(s.match(/[A-Za-z’']+|[^A-Za-z’'\s]+/g)||[]):[]}
function cleanKey(t){return t.toLowerCase().replace(/\u2019/g,"'").replace(/^[^a-z0-9']+|[^a-z0-9']+$/g,"")}
function initVoices(){if(!speechSupported)return;const synth=window.speechSynthesis;const f=()=>availableVoices=synth.getVoices()||[];f();synth.onvoiceschanged=f}
function updateSpeechSupportUI(){const msg=document.getElementById('speechUnsupportedMessage');if(msg)msg.classList.toggle('d-none',speechSupported);playButtons.forEach(b=>{if(!b)return;b.disabled=!speechSupported;if(!speechSupported){b.textContent='Audio unsupported';b.dataset.state='unsupported'}})}
async function loadVocabAI(){try{const r=await fetch("data/vocab_ai.json");vocabAI=r.ok?await r.json():{}}catch(e){vocabAI={}}}
function clampNumber(value,min,max){return Math.min(Math.max(value,min),max)}
function saveSetting(key,value){try{localStorage.setItem(key,String(value))}catch(e){}}
function loadSavedNumber(key,min,max,fallback){try{const n=parseFloat(localStorage.getItem(key));return Number.isFinite(n)?clampNumber(n,min,max):fallback}catch(e){return fallback}}
function loadSavedMode(fallback){try{const mode=localStorage.getItem(SETTINGS_KEYS.readMode);return["natural","fast","learning"].includes(mode)?mode:fallback}catch(e){return fallback}}
function applySettings(mode,rate,pause,save){currentMode=mode;document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));const btn=document.getElementById('mode-'+mode);if(btn)btn.classList.add('active');speechRate=clampNumber(parseFloat(rate)||1,parseFloat(speedSlider.min),parseFloat(speedSlider.max));wordPauseMs=Math.round(clampNumber(parseFloat(pause)||0,parseFloat(pauseSlider.min),parseFloat(pauseSlider.max)));speedSlider.value=speechRate;pauseSlider.value=wordPauseMs;speedValue.textContent=speechRate.toFixed(1)+'x';pauseValue.textContent=wordPauseMs+' ms';if(save){saveSetting(SETTINGS_KEYS.readMode,currentMode);saveSetting(SETTINGS_KEYS.speechRate,speechRate);saveSetting(SETTINGS_KEYS.wordPauseMs,wordPauseMs)}}
function getModeDefaults(mode){return mode==='fast'?{rate:1.2,pause:80}:mode==='learning'?{rate:.8,pause:250}:{rate:1,pause:0}}
function setReadMode(mode){const defaults=getModeDefaults(mode);applySettings(mode,defaults.rate,defaults.pause,true)}
function restoreSettings(){const mode=loadSavedMode('natural'),defaults=getModeDefaults(mode),rate=loadSavedNumber(SETTINGS_KEYS.speechRate,parseFloat(speedSlider.min),parseFloat(speedSlider.max),defaults.rate),pause=loadSavedNumber(SETTINGS_KEYS.wordPauseMs,parseFloat(pauseSlider.min),parseFloat(pauseSlider.max),defaults.pause);applySettings(mode,rate,pause,false)}
function speakText(text,rate,onend,onboundary){if(!speechSupported){onend&&onend();return}const u=new window.SpeechSynthesisUtterance(text);currentUtterance=u;u.lang='en-US';u.rate=rate||speechRate;const v=availableVoices.find(x=>x.lang.toLowerCase().startsWith('en'))||availableVoices[0];if(v)u.voice=v;if(onboundary)u.onboundary=onboundary;u.onend=()=>{if(currentUtterance===u)currentUtterance=null;onend&&onend()};u.onerror=u.onend;window.speechSynthesis.speak(u)}
function stopEverything(preservePosition=true){if(preservePosition&&currentSentenceIndex!==null)playbackPositions[currentSentenceIndex]=currentTokenIndex;isPlaying=false;currentSentenceIndex=null;playbackGeneration++;if(ttsTimer)clearTimeout(ttsTimer);ttsTimer=null;if(speechSupported)window.speechSynthesis.cancel();document.querySelectorAll('.word-token.active').forEach(e=>e.classList.remove('active'));playButtons.forEach(b=>{if(speechSupported){b.textContent='Play';b.dataset.state='stopped'}else{b.textContent='Audio unsupported';b.dataset.state='unsupported';b.disabled=true}});hideWordUsage()}
function finishPlayback(sentenceIndex,generation){if(generation!==playbackGeneration)return;playbackPositions[sentenceIndex]=0;currentTokenIndex=0;stopEverything(false)}
function highlightToken(sentenceIndex,tokenIndex){document.querySelectorAll('.word-token.active').forEach(e=>e.classList.remove('active'));const card=playButtons[sentenceIndex]&&playButtons[sentenceIndex].closest('.sentence-card');const token=card&&card.querySelectorAll('.word-token')[tokenIndex];if(token)token.classList.add('active')}
function tokensToSpeechText(tokens){return tokens.join(' ').replace(/\s+([.,!?;:])/g,'$1')}
function showAllSentences(){document.querySelectorAll('.sentence-body').forEach(e=>e.classList.remove('sentence-hidden'))}
function hideAllSentences(){document.querySelectorAll('.sentence-body').forEach(e=>e.classList.add('sentence-hidden'))}
function showWordUsage(token,el){const info=vocabAI[cleanKey(token)],p=document.getElementById('vocab-popup');if(!info){hideWordUsage();return}p.querySelector('.vocab-title').textContent=info.cn||cleanKey(token);p.querySelector('.vocab-label').textContent=info.usage?'Example:':'';p.querySelector('.vocab-usage').textContent=info.usage||'';p.querySelector('.vocab-tenses').textContent=info.tenses||'';p.style.display='block';p.style.visibility='hidden';const r=el.getBoundingClientRect(),pr=p.getBoundingClientRect();let top=r.top-pr.height-8,left=r.left+(r.width-pr.width)/2;if(top<8)top=r.bottom+8;left=Math.max(8,Math.min(left,innerWidth-pr.width-8));p.style.top=top+'px';p.style.left=left+'px';p.style.visibility='visible'}
function hideWordUsage(){document.getElementById('vocab-popup').style.display='none'}
async function initDictationSelector(){const sel=document.getElementById('dictationSelect'),c=document.getElementById('sentencesContainer');sel.innerHTML='<option value="">Loading catalog...</option>';try{const r=await fetch('data/catalog.json');if(!r.ok)throw new Error('HTTP '+r.status);const catalog=await r.json();dictationCatalog=Array.isArray(catalog.dictation)?catalog.dictation.filter(item=>item&&item.file):[];if(!dictationCatalog.length)throw new Error('No dictation lessons found');sel.innerHTML='';dictationCatalog.forEach(item=>{const o=document.createElement('option');o.value=item.file;o.textContent=item.title||item.id||item.file;o.dataset.level=item.level||'';o.dataset.topic=item.topic||'';sel.appendChild(o)});sel.onchange=()=>loadDictation(sel.value);loadDictation(dictationCatalog[0].file)}catch(e){dictationCatalog=[];sel.innerHTML='<option value="">Catalog unavailable</option>';sel.disabled=true;c.innerHTML='<div class="text-center text-danger mt-4">Failed to load dictation catalog. Please check data/catalog.json.</div>'}}
async function loadDictation(file){const c=document.getElementById('sentencesContainer');c.innerHTML='<div class="text-center text-muted mt-4">Loading '+file+'...</div>';stopEverything(false);playbackPositions=[];try{const r=await fetch('data/'+encodeURIComponent(file));if(!r.ok)throw new Error('HTTP '+r.status);const d=await r.json();sentences=Array.isArray(d.sentences)?d.sentences:[];playbackPositions=sentences.map(()=>0);renderSentences()}catch(e){c.innerHTML='<div class="text-center text-danger mt-4">Failed to load '+file+'.</div>'}}
function renderSentences(){const c=document.getElementById('sentencesContainer');c.innerHTML='';playButtons=[];sentences.forEach((item,i)=>{const card=document.createElement('div');card.className='sentence-card';const title=document.createElement('div');title.className='sentence-title';title.textContent='Sentence '+(i+1);const body=document.createElement('div');body.className='sentence-body sentence-hidden';const tokens=splitIntoTokens(item.full||'');tokens.forEach((t,idx)=>{const sp=document.createElement('span');sp.className='word-token';sp.textContent=t;sp.onclick=()=>{stopEverything();playbackPositions[i]=idx;currentSentenceIndex=i;currentTokenIndex=idx;sp.classList.add('active');if(speechSupported)speakText(punctuationMap[t]||t,speechRate);showWordUsage(t,sp)};sp.onmouseenter=()=>showWordUsage(t,sp);sp.onmouseleave=hideWordUsage;body.appendChild(sp);body.append(' ')});const cn=document.createElement('div');cn.className='sentence-cn';cn.textContent=item.cn||'';const controls=document.createElement('div');controls.className='d-flex flex-wrap gap-2 mt-2';const toggle=document.createElement('button');toggle.className='btn btn-secondary btn-sm';toggle.textContent='👀 Show sentence';toggle.onclick=()=>{const hidden=body.classList.toggle('sentence-hidden');toggle.textContent=hidden?'👀 Show sentence':'🙈 Hide sentence'};const play=document.createElement('button');play.className='btn btn-primary btn-sm';play.textContent=speechSupported?'Play':'Audio unsupported';play.dataset.state=speechSupported?'stopped':'unsupported';play.disabled=!speechSupported;play.onclick=()=>{if(!speechSupported)return;if(play.dataset.state==='playing'){stopEverything();return}stopEverything();const start=Math.min(playbackPositions[i]||0,Math.max(tokens.length-1,0)),generation=playbackGeneration;currentSentenceIndex=i;currentTokenIndex=start;play.textContent='Stop';play.dataset.state='playing';isPlaying=true;if(currentMode==='natural'){let boundaryIndex=start;highlightToken(i,start);speakText(tokensToSpeechText(tokens.slice(start)),speechRate,()=>finishPlayback(i,generation),event=>{if(event.name!=='word'||generation!==playbackGeneration)return;while(boundaryIndex<tokens.length&&!/[A-Za-z0-9]/.test(tokens[boundaryIndex]))boundaryIndex++;if(boundaryIndex<tokens.length){currentTokenIndex=boundaryIndex;playbackPositions[i]=boundaryIndex;highlightToken(i,boundaryIndex);boundaryIndex++}})}else playTokens(tokens,start,play,i,generation)};const stop=document.createElement('button');stop.className='btn btn-danger btn-sm';stop.textContent='Stop';stop.onclick=stopEverything;controls.append(toggle,play,stop);card.append(title,body,cn,controls);c.appendChild(card);playButtons[i]=play});updateSpeechSupportUI()}
function playTokens(tokens,idx,btn,sentenceIndex,generation){if(generation!==playbackGeneration||!isPlaying)return;if(idx>=tokens.length){finishPlayback(sentenceIndex,generation);return}currentSentenceIndex=sentenceIndex;currentTokenIndex=idx;playbackPositions[sentenceIndex]=idx;highlightToken(sentenceIndex,idx);speakText(punctuationMap[tokens[idx]]||tokens[idx],speechRate,()=>{if(generation!==playbackGeneration||!isPlaying)return;currentTokenIndex=idx+1;playbackPositions[sentenceIndex]=idx+1;ttsTimer=setTimeout(()=>playTokens(tokens,idx+1,btn,sentenceIndex,generation),wordPauseMs)})}
document.addEventListener('click',e=>{if(!e.target.closest('.word-token')&&!e.target.closest('#vocab-popup'))hideWordUsage()},true);
document.addEventListener('DOMContentLoaded',()=>{updateSpeechSupportUI();initVoices();loadVocabAI();speedSlider.oninput=()=>{speechRate=clampNumber(parseFloat(speedSlider.value)||1,parseFloat(speedSlider.min),parseFloat(speedSlider.max));speedSlider.value=speechRate;speedValue.textContent=speechRate.toFixed(1)+'x';saveSetting(SETTINGS_KEYS.speechRate,speechRate)};pauseSlider.oninput=()=>{wordPauseMs=Math.round(clampNumber(parseInt(pauseSlider.value,10)||0,parseFloat(pauseSlider.min),parseFloat(pauseSlider.max)));pauseSlider.value=wordPauseMs;pauseValue.textContent=wordPauseMs+' ms';saveSetting(SETTINGS_KEYS.wordPauseMs,wordPauseMs)};restoreSettings();initDictationSelector()});
</script>
</body>
</html>
