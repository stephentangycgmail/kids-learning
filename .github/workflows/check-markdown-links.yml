name: Check Markdown Links

on:
  pull_request:
    paths:
      - "**/*.md"
      - ".github/workflows/check-markdown-links.yml"
  push:
    branches:
      - main
      - develop
    paths:
      - "**/*.md"
      - ".github/workflows/check-markdown-links.yml"

jobs:
  check-markdown-links:
    name: Check local Markdown links
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check local links
        shell: bash
        run: |
          node <<'NODE'
          const fs = require("fs");
          const path = require("path");

          const ignoredDirs = new Set([
            ".git",
            "node_modules",
            ".venv",
            "venv",
            "env",
            "ENV",
          ]);

          const markdownFiles = [];

          function walk(dir) {
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              if (entry.isDirectory()) {
                if (!ignoredDirs.has(entry.name)) {
                  walk(path.join(dir, entry.name));
                }
                continue;
              }

              if (entry.isFile() && entry.name.endsWith(".md")) {
                markdownFiles.push(path.join(dir, entry.name));
              }
            }
          }

          function isExternalLink(href) {
            return /^[a-z][a-z0-9+.-]*:/i.test(href) || href.startsWith("mailto:");
          }

          function cleanHref(rawHref) {
            return rawHref
              .trim()
              .replace(/^<|>$/g, "")
              .split("#")[0];
          }

          walk(".");

          const markdownLinkPattern = /(?<!!)\[[^\]]+\]\(([^)]+)\)/g;
          const failures = [];

          for (const file of markdownFiles.sort()) {
            const text = fs.readFileSync(file, "utf8");
            let match;

            while ((match = markdownLinkPattern.exec(text))) {
              const rawHref = match[1];
              const href = cleanHref(rawHref);

              if (!href || isExternalLink(href)) {
                continue;
              }

              const target = path.normalize(path.join(path.dirname(file), href));
              if (!fs.existsSync(target)) {
                failures.push(`${file}: missing link target ${rawHref} -> ${target}`);
              }
            }
          }

          if (failures.length) {
            console.error("Markdown link check failed:");
            for (const failure of failures) {
              console.error(`- ${failure}`);
            }
            process.exit(1);
          }

          console.log(`Checked ${markdownFiles.length} Markdown file(s).`);
          NODE
